AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  doc-intelligence-pipeline

  AI Document Intelligence Pipeline with API Gateway for frontend

Globals:
  Function:
    Timeout: 60

Resources:
  # ============ EXISTING RESOURCES ============
  
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: app.lambda_handler
      Runtime: python3.11
      Tracing: Active
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref ProcessedDocumentsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProcessedDocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - S3ReadPolicy:
            BucketName: !Sub '${AWS::StackName}-documents-${AWS::AccountId}'
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref DocumentsBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .pdf

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-documents-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - "*"
            MaxAge: 3000

  ProcessedDocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-processed-documents'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH

  # ============ NEW: API GATEWAY + FUNCTIONS ============

  # Lambda to generate presigned upload URLs
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/
      Handler: upload_url.lambda_handler
      Runtime: python3.11
      Tracing: Active
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUCKET_NAME: !Ref DocumentsBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucket
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /upload-url
            Method: GET

  # Lambda to get processed documents from DynamoDB
  GetDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/
      Handler: get_documents.lambda_handler
      Runtime: python3.11
      Tracing: Active
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref ProcessedDocumentsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProcessedDocumentsTable
      Events:
        GetDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /documents
            Method: GET

  # API Gateway
  DocumentApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${DocumentApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  DocumentsBucket:
    Description: "S3 bucket for document uploads"
    Value: !Ref DocumentsBucket
  ProcessedDocumentsTable:
    Description: "DynamoDB table for processed documents"
    Value: !Ref ProcessedDocumentsTable
